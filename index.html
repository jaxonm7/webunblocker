<!DOCTYPE html>
<html>
<head>
<title>Video Trap</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}
</style>

</head>

<body>

<video id="video" autoplay muted>
<source src="YTDown.com_YouTube_FNAF-Anti-Piracy-Screen_Media_ArlGiczq7vg_001_240p.mp4" type="video/mp4">
</video>

<script>

const video = document.getElementById("video");

// enter fullscreen
function forceFullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen().catch(()=>{});
}
}

// user click starts fullscreen
document.addEventListener("click", forceFullscreen);

// if user exits fullscreen → instantly try again
document.addEventListener("fullscreenchange", () => {
if(!document.fullscreenElement){
setTimeout(forceFullscreen,10);
}
});

// freeze on the last frame
video.addEventListener("ended", () => {
video.pause();
video.currentTime = video.duration;
});

</script>

</body>
</html>
