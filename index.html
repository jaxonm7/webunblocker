<!DOCTYPE html>
<html>
<head>
<title>FNAF Anti Piracy</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
cursor:none;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}
</style>
</head>

<body>

<video id="video">
<source src="YTDown.com_YouTube_FNAF-Anti-Piracy-Screen_Media_ArlGiczq7vg_001_240p.mp4" type="video/mp4">
</video>

<script>

const video = document.getElementById("video");

function startExperience(){

// play video with sound
video.play();

// enter fullscreen
if(!document.fullscreenElement){
document.documentElement.requestFullscreen().catch(()=>{});
}

}

// start everything on click
document.addEventListener("click", startExperience, { once:true });

// freeze on the final frame
video.addEventListener("ended", ()=>{
video.pause();
video.currentTime = video.duration;
});

</script>

</body>
</html>
